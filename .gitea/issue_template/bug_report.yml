name: Bug report
about: Create a report to help us improve.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to make Saverawatch better!

        If you just have a question, please contact the Savera team first.
  - type: checkboxes
    attributes:
      label: Please confirm that;
      options:
        - label: I have checked the API docs and project guide, and I didn't find a solution to my problem / an answer to my question.
          required: true
        - label: I have searched existing issues, and I didn't find a solution to my problem / an answer to my question.
          required: true
        - label: I have read and understood the [Codeberg Terms of Use](https://codeberg.org/Codeberg/org/src/branch/main/TermsOfUse.md) for images or other type of content that I included here.
          required: true
  - type: dropdown
    id: source
    attributes:
      label: Where did you get Saverawatch from?
      options:
        - F-Droid
        - Saverawatch Nightly F-Droid repository
        - Bangle.js Saverawatch from the Play Store
        - I built it myself from source code
        - I previously used Saverawatch from other sources and then updated to F-Droid version
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: What is your Saverawatch version?
      description: |
        This can be found in "Menu > About > Version" in Saverawatch.
        Also include tag / commit SHA if you built Saverawatch from the source.
      placeholder: e.g. "0.77.0" or "0.77.0-2618adac1" to include commit
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: What happened?
      description: >
        Please note that new issues about already solved/documented topics
        **could be closed without further comments.** Same for too generic or incomplete reports.
      placeholder: If you want to include logs, don't include it here. Use the next text field for that.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Do you have logs?
      description: >
        If possible, please attach logs
        that might help identifying the problem. This will be automatically formatted into 
        code, so no need for backticks.
      render: shell
  - type: input
    id: gadget
    attributes:
      label: What gadget do you use?
      description: >
        Please specify model and firmware version if possible. Leave blank if you believe the
        issue is not specific to the gadget that you currently use with Saverawatch.
      placeholder: e.g. ExampleWatch A1 with 0.1 firmware
  - type: input
    id: android
    attributes:
      label: What is your Android version/manufacturer flavor?
      description: >
        Android phone manufacturers may customise the Android source code as they wish, so
        if you are using a phone that running a vendor-exclusive system (like MIUI) or if 
        you use a custom ROM, make sure to also include the name of the OS/ROM.
      placeholder: e.g. LineageOS 20 based on Android 13