apply plugin: 'java'
apply plugin: 'maven-publish'
apply plugin: 'application'

archivesBaseName = 'saverawatch-daogenerator'

dependencies {
    // https://github.com/Freeyourgadget/greenDAO/tree/fyg
    // Changed to use branch name instead of commit hash
    implementation 'com.github.Freeyourgadget:greendao:fyg-SNAPSHOT'
}

sourceSets {
    main {
        java {
            srcDir 'src'
        }
    }
}

mainClassName = "id.icapps.savera.daogen.GBDaoGenerator"

tasks.register('genSources', JavaExec) {
    mainClass = mainClassName
    classpath = sourceSets.main.runtimeClasspath
    workingDir = '../'
}

artifacts {
    archives jar
}

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

tasks.named("distTar") {
    duplicatesStrategy = 'include'
}

tasks.named("distZip") {
    duplicatesStrategy = 'include'
}
